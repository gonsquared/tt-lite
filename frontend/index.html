<html lang="en" data-theme="dark">

    <meta name="description" content="Task Tracker Lite — manage your tasks simply and efficiently" />

        document.documentElement.setAttribute('data-theme', stored === 'light' ? 'light' : 'dark');
      })();
    </script>

      rel="stylesheet"
    />

  </body>
